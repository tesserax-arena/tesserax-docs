<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="32" height="32" rx="5" fill="#000000"/>
  <!-- outer faint projection (lighter at small sizes) -->
  <g stroke="#ffffff" stroke-width="0.9" opacity="0.25">
    <line x1="6" y1="6" x2="12" y2="11"/><line x1="27" y1="5" x2="21" y2="10"/>
    <line x1="28" y1="26" x2="22" y2="20"/><line x1="7" y1="27" x2="13" y2="21"/>
    <line x1="3" y1="3" x2="9" y2="8"/><line x1="24" y1="2" x2="18" y2="7"/>
    <line x1="25" y1="23" x2="19" y2="17"/><line x1="4" y1="24" x2="10" y2="18"/>
  </g>
  <!-- mid structure -->
  <g stroke="#ffffff" stroke-width="1.8" fill="none" opacity="0.55">
    <polygon points="6,6 27,5 28,26 7,27"/><polygon points="3,3 24,2 25,23 4,24"/>
    <line x1="6" y1="6" x2="3" y2="3"/><line x1="27" y1="5" x2="24" y2="2"/>
    <line x1="28" y1="26" x2="25" y2="23"/><line x1="7" y1="27" x2="4" y2="24"/>
  </g>
  <!-- core tesseract - much heavier strokes so it doesn't dissolve at 16-24px -->
  <g stroke="#ffffff" stroke-width="2.6" fill="none" opacity="1">
    <polygon points="12,11 21,10 22,20 13,21"/><polygon points="9,8 18,7 19,17 10,18"/>
    <line x1="12" y1="11" x2="9" y2="8"/><line x1="21" y1="10" x2="18" y2="7"/>
    <line x1="22" y1="20" x2="19" y2="17"/><line x1="13" y1="21" x2="10" y2="18"/>
  </g>
</svg>
